name: Sync Bluefin
on:
  schedule:
    - cron: '40 16 * * *'  # 16:40 UTC everyday
  merge_group:
  pull_request:
    branches:
      - main
      - testing
    paths-ignore:
      - '**.md'
  push:
    branches:
      - main
      - testing
    paths-ignore:
      - '**.md'

jobs:
    fetch:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
                ref: bluefin

            - name: Fetch
              run: |
                git remote add bluefin https://github.com/ublue-os/bluefin.git
                git fetch bluefin
                git checkout -b bluefin bluefin/main
                git pull bluefin main
            
            - name: create pull request
              run: gh pr create -B main -H bluefin/main --title 'Merge bluefin changes' --body 'Created by Github action'
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}